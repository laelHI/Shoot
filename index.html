<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div>
            <h1>Shoot</h1>
            <p class="score">Score: <span id="scoreCount"> 0 </span></p>
            <p class="record">Record: <span id="recordCount"> 0 </span></p>
        </div>

        <div style="margin-bottom: 20px;">
            <canvas id="canvas" width="800px" height="500px">
                Your browser does not support HTML5 canvas.
            </canvas>
        </div>
        <div class="gameOver">
            <p> Game over
            </p>
            <p style="font-size: 15px;"> tap to play again
            </p>
        </div>

    </body>
    <script src="script.js"></script>
</html>
